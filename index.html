<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>電気イスゲーム</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh; background: #09090b; color: #f4f4f5;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    display: flex; justify-content: center; padding: 24px 16px;
  }
  #app { width: 100%; max-width: 420px; }
  h1 { font-size: 24px; font-weight: 900; text-align: center; margin: 0 0 4px; }
  .sub { text-align: center; color: #71717a; font-size: 14px; margin-bottom: 28px; }
  .card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #71717a; margin-bottom: 6px; display: block; }
  input[type=text] {
    width: 100%; background: #27272a; border: none; border-radius: 12px; padding: 12px 16px;
    color: #f4f4f5; font-size: 16px; margin-bottom: 16px; outline: none;
  }
  input[type=text]:focus { box-shadow: 0 0 0 2px #facc15; }
  button {
    width: 100%; border: none; border-radius: 12px; padding: 14px; font-weight: 700; font-size: 15px;
    cursor: pointer; transition: transform 0.1s;
  }
  button:active { transform: scale(0.96); }
  button:disabled { opacity: 0.5; cursor: default; }
  .btn-primary { background: #facc15; color: #18181b; }
  .btn-secondary { background: #27272a; border: 1px solid #3f3f46; color: #f4f4f5; }
  .divider { display: flex; align-items: center; gap: 8px; margin: 14px 0; color: #52525b; font-size: 12px; }
  .divider .line { flex: 1; height: 1px; background: #27272a; }
  .err { color: #f87171; font-size: 14px; text-align: center; margin-top: 8px; }
  .center { text-align: center; }
  .muted { color: #71717a; font-size: 14px; }
  .pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .roomcode { font-size: 36px; font-weight: 900; letter-spacing: 0.3em; color: #facc15; margin: 12px 0; }
  .toprow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-size: 14px; color: #71717a;}
  .toprow b { color: #facc15; font-family: monospace; }
  .toprow a { color: #71717a; font-size: 12px; text-decoration: underline; cursor: pointer; }
  .scorebar { display: flex; justify-content: space-between; align-items: center; background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; }
  .scorebox { text-align: center; flex: 1; }
  .scorebox .name { font-size: 11px; color: #71717a; }
  .scorebox .val { font-size: 24px; font-weight: 900; }
  .scorebox .bomb { font-size: 10px; color: #ef4444; }
  .vs { color: #3f3f46; font-weight: 700; }
  .chairgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .chair {
    aspect-ratio: 1; border-radius: 12px; font-weight: 900; font-size: 20px;
    display: flex; align-items: center; justify-content: center; border: 1px solid #3f3f46;
    background: #27272a; color: #f4f4f5;
  }
  .chair.used { background: #18181b; color: #52525b; border-color: #27272a; text-decoration: line-through; }
  .rolebtns { display: flex; gap: 12px; margin-bottom: 12px; }
  .rolebtns button { padding: 18px 8px; }
  .log { margin-top: 16px; background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 12px; }
  .log .title { font-size: 11px; color: #71717a; margin-bottom: 8px; }
  .scoreboard-wrap { overflow-x: auto; }
  table.scoreboard { border-collapse: collapse; width: 100%; font-size: 13px; white-space: nowrap; }
  table.scoreboard th, table.scoreboard td { padding: 6px 8px; text-align: center; border-bottom: 1px solid #27272a; }
  table.scoreboard th { color: #71717a; font-weight: 600; font-size: 11px; }
  table.scoreboard td.namecell { text-align: left; color: #f4f4f5; font-weight: 700; position: sticky; left: 0; background: #18181b; }
  table.scoreboard td.shock { color: #facc15; font-weight: 900; }
  table.scoreboard td.total { font-weight: 900; color: #facc15; border-left: 1px solid #3f3f46; }
  table.scoreboard td.dash { color: #3f3f46; }
  .rules-fab {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #27272a; border: 1px solid #3f3f46; color: #f4f4f5; padding: 10px 20px;
    border-radius: 999px; font-size: 13px; font-weight: 700; width: auto; z-index: 50;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-box {
    background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 20px;
    max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative;
  }
  .modal-close {
    position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 999px;
    background: #27272a; color: #f4f4f5; font-size: 16px; padding: 0; line-height: 1;
  }
  .rules-text { font-size: 14px; line-height: 1.7; color: #d4d4d8; }
  .rules-text h3 { color: #facc15; font-size: 14px; margin: 14px 0 6px; }
  .rules-text ul { margin: 0; padding-left: 18px; }
  .logrow { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; }
  .logrow.bomb { color: #f87171; }
  .trophy { font-size: 40px; text-align: center; margin-bottom: 8px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ====== Firebase REST config ======
const DB_URL = "https://electric-chair-7bfbb-default-rtdb.firebaseio.com".replace(/\/$/, "");

// ====== Utility ======
const CHAIR_COUNT = 12;
function simpleHash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h * 33) ^ str.charCodeAt(i)) >>> 0;
  return h.toString(36);
}
function randSalt() {
  return Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 6);
}
function remainingChairs(used) {
  const set = new Set(used);
  const rem = [];
  for (let i = 1; i <= CHAIR_COUNT; i++) if (!set.has(i)) rem.push(i);
  return rem;
}
function genCode() { return String(Math.floor(1000 + Math.random() * 9000)); }

async function dbGet(path) {
  const res = await fetch(`${DB_URL}/${path}.json`);
  if (!res.ok) throw new Error("読み込み失敗 (" + res.status + ")");
  return await res.json();
}
async function dbPut(path, value) {
  const res = await fetch(`${DB_URL}/${path}.json`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(value),
  });
  if (!res.ok) throw new Error("書き込み失敗 (" + res.status + ")");
  return await res.json();
}
async function loadRoom(code) {
  try {
    const r = await dbGet(`rooms/${code}`);
    return normalizeRoom(r);
  } catch (e) { return null; }
}
function normalizeRoom(r) {
  if (!r) return r;
  r.scores = r.scores || {};
  r.bombHits = r.bombHits || {};
  r.chairsUsed = r.chairsUsed || [];
  r.log = r.log || [];
  r.players = r.players || [];
  r.pending = r.pending || {};
  r.pending.phase = r.pending.phase || null;
  r.pending.bomberName = r.pending.bomberName || null;
  r.pending.sitterName = r.pending.sitterName || null;
  r.pending.commitment = r.pending.commitment || null;
  r.pending.sitChair = (r.pending.sitChair === undefined) ? null : r.pending.sitChair;
  r.turnOrder = r.turnOrder || { top: null, bottom: null };
  r.jankenWinner = (r.jankenWinner === undefined) ? null : r.jankenWinner;
  r.winner = (r.winner === undefined) ? null : r.winner;
  r.reason = r.reason || null;
  r.suddenDeath = !!r.suddenDeath;
  r.finished = !!r.finished;
  return r;
}
async function saveRoom(code, room) {
  room.updatedAt = Date.now();
  await dbPut(`rooms/${code}`, room);
}

function newRoom(code, hostName) {
  return {
    code,
    players: [{ name: hostName }],
    status: "lobby",
    coinWinnerSlot: Math.random() < 0.5 ? 0 : 1,
    jankenWinner: null,
    turnOrder: { top: null, bottom: null },
    round: 1,
    half: "top",
    suddenDeath: false,
    chairsUsed: [],
    scores: {},
    bombHits: {},
    pending: { phase: null, bomberName: null, sitterName: null, commitment: null, sitChair: null },
    log: [],
    finished: false,
    winner: null,
    reason: null,
    updatedAt: Date.now(),
  };
}

const REASON_TEXT = {
  score40: () => `40点に到達しました`,
  bomb3: () => `電撃に3回座ってしまいました`,
  "no-comeback": () => `得点差が開き、逆転が不可能と判定されました`,
  regulation: () => `8ターン終了、得点差により決着しました`,
  "sudden-death": () => `サドンデスで決着しました`,
  "chairs-empty": () => `椅子がなくなり終了しました`,
  draw: () => `引き分けです`,
};

function finish(g, winner, reason) {
  g.status = "finished"; g.finished = true; g.winner = winner; g.reason = reason;
  return g;
}

function afterSit(g) {
  const sitterName = g.pending.sitterName;
  const other = g.players.map((p) => p.name).find((n) => n !== sitterName);
  if ((g.bombHits[sitterName] || 0) >= 3) return finish(g, other, "bomb3");
  if ((g.scores[sitterName] || 0) >= 40) return finish(g, sitterName, "score40");
  const remaining = remainingChairs(g.chairsUsed);
  if (remaining.length === 0) {
    const sTop = g.scores[g.turnOrder.top] || 0;
    const sBot = g.scores[g.turnOrder.bottom] || 0;
    if (sTop === sBot) return finish(g, null, "draw");
    return finish(g, sTop > sBot ? g.turnOrder.top : g.turnOrder.bottom, "chairs-empty");
  }
  if (!g.suddenDeath) {
    let topTurnsLeft, bottomTurnsLeft;
    if (g.half === "top") {
      bottomTurnsLeft = 9 - g.round; // this round's bottom half + future rounds
      topTurnsLeft = 8 - g.round;
    } else {
      topTurnsLeft = 8 - g.round;
      bottomTurnsLeft = 8 - g.round;
    }
    const topScore = g.scores[g.turnOrder.top] || 0;
    const botScore = g.scores[g.turnOrder.bottom] || 0;
    const sortedDesc = [...remaining].sort((a, b) => b - a);
    const maxGain = (turns) => sortedDesc.slice(0, Math.max(0, turns)).reduce((a, b) => a + b, 0);
    if (topScore > botScore && botScore + maxGain(bottomTurnsLeft) <= topScore) {
      return finish(g, g.turnOrder.top, "no-comeback");
    }
    if (botScore > topScore && topScore + maxGain(topTurnsLeft) <= botScore) {
      return finish(g, g.turnOrder.bottom, "no-comeback");
    }
  }
  if (g.half === "top") {
    g.half = "bottom";
    g.pending = { phase: "bomb", bomberName: g.turnOrder.top, sitterName: g.turnOrder.bottom, commitment: null, sitChair: null };
    return g;
  } else {
    if (g.round < 8) {
      g.round += 1; g.half = "top";
      g.pending = { phase: "bomb", bomberName: g.turnOrder.bottom, sitterName: g.turnOrder.top, commitment: null, sitChair: null };
      return g;
    }
    const sTop = g.scores[g.turnOrder.top] || 0;
    const sBot = g.scores[g.turnOrder.bottom] || 0;
    if (!g.suddenDeath) {
      if (sTop !== sBot) return finish(g, sTop > sBot ? g.turnOrder.top : g.turnOrder.bottom, "regulation");
      g.suddenDeath = true; g.round += 1; g.half = "top";
      g.pending = { phase: "bomb", bomberName: g.turnOrder.bottom, sitterName: g.turnOrder.top, commitment: null, sitChair: null };
      return g;
    } else {
      if (sTop !== sBot) return finish(g, sTop > sBot ? g.turnOrder.top : g.turnOrder.bottom, "sudden-death");
      if (remaining.length === 0) return finish(g, null, "draw");
      g.round += 1; g.half = "top";
      g.pending = { phase: "bomb", bomberName: g.turnOrder.bottom, sitterName: g.turnOrder.top, commitment: null, sitChair: null };
      return g;
    }
  }
}

// ====== App state ======
let screen = "home";
let name = "";
let codeInput = "";
let roomCode = null;
let room = null;
let error = "";
let busy = false;
let secret = null; // {bombChair, salt} — local only, never sent to Firebase
let pollTimer = null;
let rulesOpen = false;

const app = document.getElementById("app");

function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const k in attrs || {}) {
    if (k === "class") el.className = attrs[k];
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === "html") el.innerHTML = attrs[k];
    else el.setAttribute(k, attrs[k]);
  }
  children.flat().forEach((c) => {
    if (c === null || c === undefined || c === false) return;
    el.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(c) : c);
  });
  return el;
}

async function refresh() {
  if (!roomCode) return;
  try {
    const r = await loadRoom(roomCode);
    if (!r) return;
    if (secret && r.pending && r.pending.phase === "reveal" && r.pending.bomberName === name.trim()) {
      const wasBomb = r.pending.sitChair === secret.bombChair;
      const sitterName = r.pending.sitterName;
      const chairNum = r.pending.sitChair;
      if (wasBomb) {
        r.bombHits[sitterName] = (r.bombHits[sitterName] || 0) + 1;
        r.scores[sitterName] = 0;
      } else {
        r.chairsUsed = [...r.chairsUsed, chairNum];
        r.scores[sitterName] = (r.scores[sitterName] || 0) + chairNum;
      }
      r.log = [{ round: r.round, half: r.half, sitter: sitterName, chair: chairNum, bomb: wasBomb }, ...(r.log || [])];
      const result = afterSit(r);
      secret = null;
      await saveRoom(roomCode, result);
      room = result;
      render();
      return;
    }
    room = r;
    render();
  } catch (e) { /* ignore transient errors */ }
}

function startPolling() {
  stopPolling();
  refresh();
  pollTimer = setInterval(refresh, 1500);
}
function stopPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = null;
}

async function handleCreate() {
  if (!name.trim()) { error = "名前を入力してください"; render(); return; }
  busy = true; error = ""; render();
  try {
    let code = genCode();
    let existing = await loadRoom(code);
    let tries = 0;
    while (existing && tries < 5) { code = genCode(); existing = await loadRoom(code); tries++; }
    const r = newRoom(code, name.trim());
    await saveRoom(code, r);
    roomCode = code; room = r; screen = "room";
  } catch (e) {
    error = "部屋の作成に失敗しました: " + (e && e.message ? e.message : String(e));
  }
  busy = false; render();
  if (screen === "room") startPolling();
}

async function handleJoin() {
  if (!name.trim()) { error = "名前を入力してください"; render(); return; }
  if (!/^\d{4}$/.test(codeInput.trim())) { error = "4桁のルームコードを入力してください"; render(); return; }
  busy = true; error = ""; render();
  try {
    const code = codeInput.trim();
    const r = await loadRoom(code);
    if (!r) { error = "その部屋は見つかりません"; busy = false; render(); return; }
    const already = r.players.find((p) => p.name === name.trim());
    if (!already) {
      if (r.players.length >= 2) { error = "この部屋は満員です"; busy = false; render(); return; }
      r.players.push({ name: name.trim() });
      r.status = "choose-order";
      r.jankenWinner = r.players[r.coinWinnerSlot].name;
      r.players.forEach((p) => { r.scores[p.name] = 0; r.bombHits[p.name] = 0; });
      await saveRoom(code, r);
    }
    roomCode = code; room = r; screen = "room";
  } catch (e) {
    error = "参加に失敗しました: " + (e && e.message ? e.message : String(e));
  }
  busy = false; render();
  if (screen === "room") startPolling();
}

async function withRoom(mutator) {
  busy = true; render();
  try {
    const fresh = (await loadRoom(roomCode)) || room;
    const next = mutator(JSON.parse(JSON.stringify(fresh)));
    if (next) { await saveRoom(roomCode, next); room = next; }
  } catch (e) { /* will resync on next poll */ }
  busy = false; render();
}

function chooseOrder(role) {
  withRoom((r) => {
    const winner = r.jankenWinner;
    const other = r.players.map((p) => p.name).find((n) => n !== winner);
    r.turnOrder = role === "top" ? { top: winner, bottom: other } : { top: other, bottom: winner };
    r.status = "playing";
    r.pending = { phase: "bomb", bomberName: r.turnOrder.bottom, sitterName: r.turnOrder.top, commitment: null, sitChair: null };
    return r;
  });
}
function pickBomb(num) {
  const salt = randSalt();
  const commitment = simpleHash(`${num}-${salt}`);
  secret = { bombChair: num, salt };
  withRoom((r) => { r.pending.commitment = commitment; r.pending.phase = "sit"; return r; });
}
function pickSit(num) {
  withRoom((r) => { r.pending.sitChair = num; r.pending.phase = "reveal"; return r; });
}
function playAgain() {
  withRoom((r) => {
    const players = r.players;
    const fresh = newRoom(roomCode, players[0].name);
    fresh.players = players;
    fresh.status = "choose-order";
    fresh.jankenWinner = players[fresh.coinWinnerSlot].name;
    players.forEach((p) => { fresh.scores[p.name] = 0; fresh.bombHits[p.name] = 0; });
    return fresh;
  });
}
function leaveRoom() {
  stopPolling(); screen = "home"; room = null; roomCode = null; secret = null; render();
}

// ====== Rendering ======
function chairGrid(used, onPick, disabled) {
  const grid = h("div", { class: "chairgrid" });
  for (let n = 1; n <= CHAIR_COUNT; n++) {
    const isUsed = used.includes(n);
    const btn = h("button", {
      class: "chair" + (isUsed ? " used" : ""),
      onClick: () => { if (!isUsed && !disabled) onPick(n); },
    }, String(n));
    if (isUsed || disabled) btn.disabled = true;
    grid.appendChild(btn);
  }
  return grid;
}
function scoreboardTable(topName, botName) {
  const log = room.log || [];
  const maxRound = Math.max(room.round, ...log.map((l) => l.round), 1);
  const findCell = (playerHalf, r) => log.find((l) => l.round === r && l.half === playerHalf);

  const table = h("table", { class: "scoreboard" });
  const headRow = h("tr", {}, h("th", {}, ""));
  for (let r = 1; r <= maxRound; r++) headRow.appendChild(h("th", {}, String(r)));
  headRow.appendChild(h("th", {}, "計"));
  table.appendChild(headRow);

  function buildRow(playerName, half) {
    const row = h("tr", {}, h("td", { class: "namecell" }, playerName));
    for (let r = 1; r <= maxRound; r++) {
      const cell = findCell(half, r);
      if (cell) {
        row.appendChild(h("td", { class: cell.bomb ? "shock" : "" }, cell.bomb ? "⚡" : String(cell.chair)));
      } else {
        row.appendChild(h("td", { class: "dash" }, "-"));
      }
    }
    row.appendChild(h("td", { class: "total" }, String(room.scores[playerName] || 0)));
    return row;
  }
  table.appendChild(buildRow(topName, "top"));
  table.appendChild(buildRow(botName, "bottom"));
  return h("div", { class: "scoreboard-wrap" }, table);
}

const RULES_HTML = `
<h3>基本ルール</h3>
<ul>
<li>1〜12番の椅子が12個あります</li>
<li>先攻・後攻はコイントスで決定。先攻は毎ラウンド先に座り、後攻は毎ラウンド先に電撃を仕掛けます</li>
<li>座る役は電撃のない椅子に座れば、その番号分の得点を獲得。その椅子は使用済みになります</li>
<li>電撃のある椅子に座ると、得点は0でそれまでの得点はすべて没収されます(ただしその椅子は使用済みにならず残ります)</li>
</ul>
<h3>勝敗条件</h3>
<ul>
<li>電撃に3回座った時点でその場で敗北</li>
<li>40点に到達した時点でその場で勝利</li>
<li>8ターン(表・裏)で対戦。ただし各ターン終了時、残りの椅子と残り手番を考慮しても得点差が逆転不可能と判定された時点で、その場で試合終了になります</li>
<li>8ターン終了時に同点なら9ターン目以降サドンデスで決着</li>
</ul>
`;

function rulesModal() {
  return h("div", { class: "modal-overlay", onClick: (e) => { if (e.target.classList.contains("modal-overlay")) { rulesOpen = false; render(); } } },
    h("div", { class: "modal-box" },
      h("button", { class: "modal-close", onClick: () => { rulesOpen = false; render(); } }, "✕"),
      h("h2", { style: "margin:0 0 8px" }, "ルール"),
      h("div", { class: "rules-text", html: RULES_HTML })
    )
  );
}

function scoreBar(myName, oppName) {
  return h("div", { class: "scorebar" },
    h("div", { class: "scorebox" },
      h("div", { class: "name" }, myName + "(自分)"),
      h("div", { class: "val", style: "color:#facc15" }, String(room.scores[myName] || 0)),
      h("div", { class: "bomb" }, `電撃 ${room.bombHits[myName] || 0}/3`)
    ),
    h("div", { class: "vs" }, "VS"),
    h("div", { class: "scorebox" },
      h("div", { class: "name" }, oppName || ""),
      h("div", { class: "val" }, String(room.scores[oppName] || 0)),
      h("div", { class: "bomb" }, `電撃 ${room.bombHits[oppName] || 0}/3`)
    )
  );
}

function render() {
  app.innerHTML = "";

  if (screen === "home") {
    const nameInput = h("input", {
      type: "text", placeholder: "ニックネーム", value: name, maxlength: 12,
      onInput: (e) => { name = e.target.value; },
    });
    const codeInputEl = h("input", {
      type: "text", placeholder: "4桁のルームコード", inputmode: "numeric", value: codeInput,
      style: "text-align:center; letter-spacing:0.2em;",
      onInput: (e) => { codeInput = e.target.value.replace(/\D/g, "").slice(0, 4); e.target.value = codeInput; },
    });
    app.appendChild(
      h("div", {},
        h("h1", {}, "⚡ 電気イスゲーム"),
        h("div", { class: "sub" }, "12個の椅子。電撃の場所を読み合え。"),
        h("div", { class: "card" },
          h("span", { class: "label" }, "あなたの名前"),
          nameInput,
          h("button", { class: "btn-primary", onClick: handleCreate, ...(busy ? { disabled: true } : {}) }, "部屋を作る"),
          h("div", { class: "divider" }, h("div", { class: "line" }), "または", h("div", { class: "line" })),
          codeInputEl,
          h("button", { class: "btn-secondary", onClick: handleJoin, ...(busy ? { disabled: true } : {}) }, "部屋に参加する")
        ),
        error ? h("div", { class: "err" }, error) : null
      )
    );
    app.appendChild(h("button", { class: "rules-fab", onClick: () => { rulesOpen = true; render(); } }, "📖 ルール"));
    if (rulesOpen) app.appendChild(rulesModal());
    return;
  }

  if (!room) {
    app.appendChild(h("div", { class: "center muted", style: "padding-top:80px" }, "読み込み中..."));
    return;
  }

  const myName = name.trim();
  const oppName = room.players.map((p) => p.name).find((n) => n !== myName);
  const iAmIn = room.players.some((p) => p.name === myName);

  const top = h("div", { class: "toprow" },
    h("div", {}, "部屋 ", h("b", {}, roomCode)),
    h("a", { onClick: leaveRoom }, "退出")
  );

  if (!iAmIn) {
    app.appendChild(h("div", {}, top, h("div", { class: "err center", style: "padding-top:60px" }, "この部屋のプレイヤーではありません。")));
    return;
  }

  const wrap = h("div", {}, top);

  if (room.status === "lobby") {
    wrap.appendChild(h("div", { class: "card center" },
      h("p", {}, "友達にルームコードを伝えてください"),
      h("div", { class: "roomcode" }, roomCode),
      h("p", { class: "muted pulse" }, "相手の参加を待っています...")
    ));
  }

  if (room.status === "choose-order") {
    const card = h("div", { class: "card center" });
    if (room.jankenWinner === myName) {
      card.appendChild(h("p", { style: "color:#facc15; font-weight:700;" }, "コイントスに勝ちました!"));
      card.appendChild(h("p", { class: "muted" }, "先攻(先に座る)か後攻(先に電撃を仕掛ける)かを選んでください"));
      card.appendChild(h("div", { class: "rolebtns" },
        h("button", { class: "btn-primary", onClick: () => chooseOrder("top"), ...(busy ? { disabled: true } : {}) }, "先攻"),
        h("button", { class: "btn-secondary", onClick: () => chooseOrder("bottom"), ...(busy ? { disabled: true } : {}) }, "後攻")
      ));
    } else {
      card.appendChild(h("p", { class: "muted pulse" }, "相手が先攻・後攻を選択中..."));
    }
    wrap.appendChild(card);
  }

  if (room.status === "playing") {
    const isBomber = room.pending.bomberName === myName;
    const isSitter = room.pending.sitterName === myName;
    const phase = room.pending.phase;
    wrap.appendChild(scoreBar(myName, oppName));
    wrap.appendChild(h("div", { class: "center muted", style: "margin-bottom:12px" },
      `${room.suddenDeath ? "サドンデス " : ""}${room.round}ターン ${room.half === "top" ? "表" : "裏"}`));

    if (isBomber && phase === "bomb") {
      wrap.appendChild(h("div", { class: "center", style: "color:#f87171; font-weight:700; margin-bottom:12px" }, "⚡ 電撃を仕掛ける椅子を選んでください"));
      wrap.appendChild(chairGrid(room.chairsUsed, pickBomb, busy));
    }
    if (isSitter && phase === "sit") {
      wrap.appendChild(h("div", { class: "center", style: "color:#facc15; font-weight:700; margin-bottom:12px" }, "🪑 座る椅子を選んでください"));
      wrap.appendChild(chairGrid(room.chairsUsed, pickSit, busy));
    }
    if (!isBomber && phase === "bomb") {
      wrap.appendChild(h("div", { class: "center muted pulse", style: "padding:30px 0" }, `${oppName} が電撃を仕掛けています...`));
    }
    if (!isSitter && phase === "sit") {
      wrap.appendChild(h("div", { class: "center muted pulse", style: "padding:30px 0" }, `${oppName} が椅子を選んでいます...`));
    }
    if (phase === "reveal") {
      wrap.appendChild(h("div", { class: "center muted pulse", style: "padding:30px 0" }, "結果を確認しています..."));
    }

    if (room.turnOrder && room.turnOrder.top) {
      wrap.appendChild(h("div", { class: "log" },
        h("div", { class: "title" }, "スコアボード"),
        scoreboardTable(room.turnOrder.top, room.turnOrder.bottom)
      ));
    }
  }

  if (room.status === "finished") {
    const card = h("div", { class: "card center" });
    card.appendChild(h("div", { class: "trophy" }, room.winner ? "🏆" : "🤝"));
    card.appendChild(h("h2", { style: "margin:0 0 4px" },
      !room.winner ? "引き分け" : (room.winner === myName ? "あなたの勝利!" : "あなたの敗北...")));
    card.appendChild(h("p", { class: "muted", style: "margin-bottom:16px" }, REASON_TEXT[room.reason] ? REASON_TEXT[room.reason]() : ""));
    card.appendChild(scoreBar(myName, oppName));
    if (room.turnOrder && room.turnOrder.top) {
      card.appendChild(h("div", { style: "margin-top:12px" }, scoreboardTable(room.turnOrder.top, room.turnOrder.bottom)));
    }
    card.appendChild(h("button", { class: "btn-primary", style: "margin-top:12px", onClick: playAgain }, "🔄 もう一度対戦する"));
    wrap.appendChild(card);
  }

  app.appendChild(wrap);
  app.appendChild(h("button", { class: "rules-fab", onClick: () => { rulesOpen = true; render(); } }, "📖 ルール"));
  if (rulesOpen) app.appendChild(rulesModal());
}

render();
</script>
</body>
</html>
